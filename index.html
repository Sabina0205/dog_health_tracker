<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Health Tracker</title>

<link rel="icon" href="./img/paw_clean.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background: #0C8A7C; color:white; }

/* Header */
header {
  background: linear-gradient(135deg, #0C8A7C, #13b8a6);
  padding: 100px 20px 160px 20px;
  text-align: center;
  clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
}

.header-logo {
  display:flex; justify-content:center; margin-bottom:20px;
}
.header-logo div {
  background:#0C8A7C; border-radius:50%; width:80px; height:80px;
  display:flex; justify-content:center; align-items:center;
}
.header-logo img { width:50px; }

h1 { font-size: 3rem; }
.subtitle { margin-top:15px; }

.btn-download {
  display:inline-block;
  margin-top:30px;
  padding:15px 35px;
  background:white;
  color:#0C8A7C;
  border-radius:50px;
  text-decoration:none;
}

/* Features */
section.features {
  background:white; color:#333;
  padding:100px 20px;
  text-align:center;
}
.features-container {
  display:flex; flex-wrap:wrap;
  justify-content:center; gap:40px;
}
.feature-box {
  max-width:250px;
  padding:25px;
  border-radius:25px;
  background:#f7f7f7;
}

/* Contact */
section.contact {
  padding:60px 20px;
  text-align:center;
}
.contact form {
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
  max-width:400px;
  margin:auto;
}
.contact input, .contact textarea {
  padding:12px;
  border-radius:10px;
  border:none;
}
.contact button {
  padding:12px;
  border-radius:50px;
  border:none;
  background:white;
  color:#0C8A7C;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="header-logo">
    <div>
      <img src="./img/paw_clean.png">
    </div>
  </div>

  <h1>Pet Health Tracker</h1>
  <p class="subtitle">Sleduj zdravie svojho miláčika 🐕✨</p>

  <a href="https://github.com/Sabina0205/dog_health_tracker/releases/download/v1.0.0/app-release.apk" class="btn-download">
    Stiahnuť APK
  </a>
</header>

<section class="features">
  <h2>Funkcie aplikácie</h2>
  <div class="features-container">
    <div class="feature-box">💉 Očkovania</div>
    <div class="feature-box">📊 Záznamy</div>
    <div class="feature-box">⏰ Pripomienky</div>
    <div class="feature-box">☁ Cloud</div>
  </div>
</section>

<section class="contact">
  <h2>Kontaktuj nás</h2>

  <!-- NOVÝ FORM -->
  <form id="contact-form">
    <input type="text" name="name" placeholder="Tvoje meno" required>
    <input type="email" name="email" placeholder="Tvoj e-mail" required>
    <textarea name="message" placeholder="Správa" required></textarea>
    <button type="submit">Odoslať</button>
  </form>

  <p id="status" style="margin-top:15px;"></p>
</section>

<script>
/* Inicializácia EmailJS */
(function(){
  emailjs.init("YOUR_PUBLIC_KEY"); // ← SEM DÁŠ PUBLIC KEY
})();

/* Odoslanie formulára */
document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();

  emailjs.sendForm(
    "YOUR_SERVICE_ID",   // ← SEM SERVICE ID
    "YOUR_TEMPLATE_ID",  // ← SEM TEMPLATE ID
    this
  ).then(function() {
    document.getElementById("status").innerText = "Správa odoslaná ✅";
  }, function(error) {
    document.getElementById("status").innerText = "Chyba pri odoslaní ❌";
    console.log(error);
  });
});
</script>

</body>
</html>
